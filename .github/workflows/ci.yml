name: QA Automation CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'tests/**'
      - 'src/**'
      - 'requirements.txt'
      - 'pytest.ini'
      - '.github/workflows/**'

  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'src/**'
      - 'requirements.txt'
      - 'pytest.ini'
      - '.github/workflows/**'

  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to run'
        required: true
        default: 'smoke'

jobs:
  tests:
    runs-on: buntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run scheduled smoke tests
        if: github.event_name == 'schedule'
        run: pytest -m smoke -v

      - name: Run manual selected suite
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.suite }}" = "smoke" ]; then
            pytest -m smoke -v
          elif [ "${{ github.event.inputs.suite }}" = "api" ]; then
            pytest tests/api -v
          elif [ "${{ github.event.inputs.suite }}" = "ui" ]; then
            pytest tests/ui -v
          elif [ "${{ github.event.inputs.suite }}" = "db" ]; then
            pytest tests/db -v
          else
            pytest -v
          fi

      - name: Run CI suite for push and pull request
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: pytest -m "smoke or api" -v