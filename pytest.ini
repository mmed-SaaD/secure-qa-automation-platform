[pytest]
testpaths = tests 
python_files = test_*.py 
addopts = -q -ra --screenshot="only-on-failure" --video="retain-on-failure" --tracing="retain-on-failure"
markers = 
    smoke : quick checks to verify wether the app is up
    api : API tests
    ui : UI tests
    security: security checks
    auth : Authentication/Authorization cases
    unauthorized : Unauthorized Cases
    negative : Negative cases
    e2e : End to End test cases